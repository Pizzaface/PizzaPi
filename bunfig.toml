# Root-level bunfig.toml — applies when `bun test` is run from the repo root.
#
# The canonical test command is `bun run test` (which cd's into each package so
# that package-local bunfig.toml files are picked up automatically).  This file
# provides equivalent module-resolution config for the less-common `bun test`
# invocation from the repo root so that UI tests that use the `@/` path alias
# (which maps to packages/ui/src/) can be resolved without errors.

[test]
# NOTE: Do NOT add a root-level preload here — harness/preload.ts imports redis
# which is not installed in the root node_modules, causing all 168 test files
# to fail with "Cannot find package 'redis'".  The harness preload is only
# needed when running harness integration tests directly, which are excluded
# from the default `bun test` invocation anyway.

# Harness integration tests (mock-runner, builders, integration, mock-viewer)
# require a real Redis + HTTP server and break when run in the same Bun worker
# as unit tests that call mock.module("redis", …). Run them in isolation:
#   bun test packages/server/tests/harness/
# Tracking: Godmother idea "harness Redis mock.module contamination"
exclude = ["packages/server/tests/harness/mock-runner.test.ts", "packages/server/tests/harness/builders.test.ts", "packages/server/tests/harness/integration.test.ts", "packages/server/tests/harness/mock-viewer.test.ts"]

[test.module-resolution]
# Resolve `@/*` imports to packages/ui/src/* so that UI component tests can be
# discovered and run from the repo root in the same way they are when bun test
# is run from inside packages/ui/ (where the package-local bunfig.toml handles
# this mapping).  Only packages/ui uses the `@/` alias convention.
paths = { "@/*" = ["./packages/ui/src/*"] }
