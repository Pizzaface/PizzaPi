services:
  redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    # Redis is only accessed by the server container on the Docker network.
    # Uncomment the ports mapping below if you need direct host access.
    # ports:
    #   - "6379:6379"
    restart: unless-stopped

  server:
    build:
      context: ..
      dockerfile: Dockerfile
    ports:
      - "7492:7492"
    environment:
      - PORT=7492
      - PIZZAPI_REDIS_URL=redis://redis:6379
      # Disable new signups after the first user has registered (default: true)
      # Set to false to allow unlimited registrations.
      # - PIZZAPI_DISABLE_SIGNUP_AFTER_FIRST_USER=true
      # Trust X-Forwarded-For from reverse proxies for rate limiting.
      # Required when the proxy connects via a Docker bridge network (non-loopback).
      # Loopback (127.0.0.1) proxies are auto-detected without this setting.
      # - PIZZAPI_TRUST_PROXY=true
    volumes:
      - pizzapi-data:/app/data
    depends_on:
      - redis
    restart: unless-stopped

  dev:
    build:
      context: ..
      dockerfile: Dockerfile
      target: builder
    command: bun run dev
    ports:
      - "7492:7492"
      - "5173:5173"
    environment:
      - PIZZAPI_REDIS_URL=redis://redis:6379
    depends_on:
      - redis
    volumes:
      - ..:/app:Z
      - /app/node_modules
    profiles:
      - dev

volumes:
  pizzapi-data:
