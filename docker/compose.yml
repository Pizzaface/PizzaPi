services:
  redis:
    image: redis:7-alpine
    # By default, Redis runs in ephemeral mode — all data is lost on container restart.
    # This is fine for stateless relay use where sessions are transient.
    #
    # To persist Redis data across restarts, uncomment the persistence command
    # and volume mount below:
    #   --save 900 1  → RDB snapshot every 15 min if at least 1 key changed
    #   --save 300 10 → RDB snapshot every 5 min if at least 10 keys changed
    #   --appendonly yes → AOF log for durability between snapshots
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    # command: ["redis-server", "--save", "900", "1", "--save", "300", "10", "--appendonly", "yes"]
    # volumes:
    #   - redis_data:/data
    # Redis is only accessed by the server container on the Docker network.
    # Uncomment the ports mapping below if you need direct host access.
    # ports:
    #   - "6379:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  ui:
    image: ghcr.io/pizzaface/pizzapi-ui:latest
    pull_policy: always
    command: ["/bin/sh", "-c", "rm -rf /ui-dist/* && cp -a /usr/share/nginx/html/. /ui-dist/ && tail -f /dev/null"]
    volumes:
      - ui-dist:/ui-dist
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "test", "-f", "/ui-dist/index.html"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ..
      dockerfile: Dockerfile
      target: runtime-no-ui
    ports:
      - "7492:7492"
    environment:
      - PORT=7492
      - PIZZAPI_REDIS_URL=redis://redis:6379
      - AUTH_DB_PATH=/app/data/auth.db
      # ── ntfy (self-hosted push). Internal publish URL is fixed; the public
      # URL + publish token must be provided by the operator. If unset, the
      # ntfy push branch is a silent no-op and only Web Push runs.
      - PIZZAPI_NTFY_URL=http://ntfy
      # - PIZZAPI_NTFY_PUBLIC_URL=https://push.example.com
      # - PIZZAPI_NTFY_PUBLISH_TOKEN=tk_...
      # Disable new signups after the first user has registered (default: true)
      # Set to false to allow unlimited registrations.
      # - PIZZAPI_DISABLE_SIGNUP_AFTER_FIRST_USER=true
      # Enable reverse proxy header handling. Required when the server is behind
      # a non-loopback proxy (e.g. Docker overlay network, cloud load balancer).
      # Loopback proxies (127.0.0.1, ::1) are auto-detected.
      # See https://pizzaface.github.io/PizzaPi/guides/self-hosting/#reverse-proxy-configuration
      # - PIZZAPI_TRUST_PROXY=true
    volumes:
      - pizzapi-data:/app/data
      - ui-dist:/app/packages/ui/dist:ro
    depends_on:
      redis:
        condition: service_healthy
      ui:
        condition: service_healthy
      # ntfy is best-effort — the push branch degrades gracefully if it's down,
      # so no health condition. Starts before the server for ordering only.
      ntfy:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "bun", "-e", "fetch('http://localhost:7492/health').then(r => process.exit(r.ok ? 0 : 1))"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── ntfy (self-hosted push, Google-free Android background notifications) ──
  # The PizzaPi server publishes to ntfy over the internal Docker network
  # (PIZZAPI_NTFY_URL=http://ntfy). Devices subscribe to their per-user topic
  # over the public internet, so you MUST expose ntfy behind your reverse proxy
  # at a dedicated subdomain (e.g. https://push.example.com) and set
  # PIZZAPI_NTFY_PUBLIC_URL to that URL on the server.
  # See packages/docs/src/content/docs/deployment/mobile-push.mdx for the
  # reverse-proxy snippet, publish-user provisioning, and the security model.
  ntfy:
    image: binwiederhier/ntfy:v2.25.0
    command: serve
    restart: unless-stopped
    environment:
      # Operator must set these. base-url = the PUBLIC url devices use.
      - NTFY_BASE_URL=${PIZZAPI_NTFY_PUBLIC_URL:-http://localhost:2586}
      - NTFY_AUTH_FILE=/var/lib/ntfy/auth.db
      # deny-all: anonymous cannot read/write any topic. The operator provisions
      # one ntfy user+token with write access (set as PIZZAPI_NTFY_PUBLISH_TOKEN
      # on the server). Devices subscribe using per-device credentials (Phase 3)
      # or, in Phase 1, the unguessable topic name acts as the secret.
      - NTFY_AUTH_DEFAULT_ACCESS=deny-all
      - NTFY_BEHIND_PROXY=true
      # Cache so devices can retrieve messages missed while offline (catch-up).
      - NTFY_CACHE_FILE=/var/lib/ntfy/cache.db
    volumes:
      - ntfy-data:/var/lib/ntfy
    # No host port published by default — the server reaches ntfy internally as
    # http://ntfy. For device access, reverse-proxy a push. subdomain to
    # http://ntfy and set PIZZAPI_NTFY_PUBLIC_URL. Uncomment the port mapping
    # only for local testing without a reverse proxy.
    # ports:
    #   - "2586:80"
    healthcheck:
      test: ["CMD", "ntfy", "healthy"]
      interval: 15s
      timeout: 5s
      retries: 5

  dev:
    build:
      context: ..
      dockerfile: Dockerfile
      target: builder
    command: bun run dev
    ports:
      - "7492:7492"
      - "5173:5173"
    environment:
      - PIZZAPI_REDIS_URL=redis://redis:6379
    depends_on:
      - redis
    volumes:
      - ..:/app:Z
      - /app/node_modules
    profiles:
      - dev

volumes:
  pizzapi-data:
  ui-dist:
  ntfy-data:
  # redis_data:
