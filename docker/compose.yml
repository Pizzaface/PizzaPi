services:
  redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    # Redis is only accessed by the server container on the Docker network.
    # Uncomment the ports mapping below if you need direct host access.
    # ports:
    #   - "6379:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  ui:
    image: ghcr.io/pizzaface/pizzapi-ui:latest
    pull_policy: always
    command: ["/bin/sh", "-c", "rm -rf /ui-dist/* && cp -a /usr/share/nginx/html/. /ui-dist/ && tail -f /dev/null"]
    volumes:
      - ui-dist:/ui-dist
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "test", "-f", "/ui-dist/index.html"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ..
      dockerfile: Dockerfile
      target: runtime-no-ui
    ports:
      - "7492:7492"
    environment:
      - PORT=7492
      - PIZZAPI_REDIS_URL=redis://redis:6379
      # Disable new signups after the first user has registered (default: true)
      # Set to false to allow unlimited registrations.
      # - PIZZAPI_DISABLE_SIGNUP_AFTER_FIRST_USER=true
      # Enable reverse proxy header handling. Required when the server is behind
      # a non-loopback proxy (e.g. Docker overlay network, cloud load balancer).
      # Loopback proxies (127.0.0.1, ::1) are auto-detected.
      # See https://pizzaface.github.io/PizzaPi/guides/self-hosting/#reverse-proxy-configuration
      # - PIZZAPI_TRUST_PROXY=true
    volumes:
      - pizzapi-data:/app/data
      - ui-dist:/app/packages/ui/dist:ro
    depends_on:
      redis:
        condition: service_healthy
      ui:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "bun", "-e", "fetch('http://localhost:7492/health').then(r => process.exit(r.ok ? 0 : 1))"]
      interval: 10s
      timeout: 5s
      retries: 5

  dev:
    build:
      context: ..
      dockerfile: Dockerfile
      target: builder
    command: bun run dev
    ports:
      - "7492:7492"
      - "5173:5173"
    environment:
      - PIZZAPI_REDIS_URL=redis://redis:6379
    depends_on:
      - redis
    volumes:
      - ..:/app:Z
      - /app/node_modules
    profiles:
      - dev

volumes:
  pizzapi-data:
  ui-dist:
