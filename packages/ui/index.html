<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
        <title>PizzaPi</title>
        <meta name="theme-color" content="#1c1917" />
        <meta name="description" content="PizzaPi — AI coding agent interface" />
        <script>
          (function(){
            var old = localStorage.getItem("theme");
            if (old === "dark" || old === "light") { localStorage.setItem("theme-mode", old); localStorage.removeItem("theme"); }
            var m = localStorage.getItem("theme-mode") || "auto";
            var isDark = m === "dark" || (m === "auto" && window.matchMedia("(prefers-color-scheme: dark)").matches);
            if (isDark) document.documentElement.classList.add("dark");
            document.querySelector('meta[name="theme-color"]').setAttribute("content", isDark ? "#1c1917" : "#ffffff");
          })();
        </script>
        <meta name="mobile-web-app-capable" content="yes" />
        <meta name="apple-mobile-web-app-capable" content="yes" />
        <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
        <meta name="apple-mobile-web-app-title" content="PizzaPi" />
        <link rel="icon" href="/favicon.ico" sizes="48x48" />
        <link rel="icon" href="/pizza.svg" sizes="any" type="image/svg+xml" />
        <link rel="apple-touch-icon" href="/apple-touch-icon-180x180.png" />
    </head>
    <body>
        <div id="app"></div>
        <script type="module" src="/src/main.ts"></script>
    </body>
</html>
