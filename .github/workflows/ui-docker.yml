name: UI Docker Image

on:
  push:
    branches:
      - main
    paths:
      - "packages/ui/**"
      - "packages/protocol/**"
      - "packages/tools/**"
      - "patches/**"
      - "bun.lock"
      - "package.json"
      - "tsconfig.base.json"
      - ".github/workflows/ui-docker.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve UI version
        id: version
        run: |
          set -euo pipefail
          VERSION="$(python3 -c "import json, pathlib; version=(json.loads(pathlib.Path('packages/ui/package.json').read_text()).get('version') or '').strip(); assert version, 'packages/ui/package.json is missing a semantic version'; print(version)")"
          echo "value=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push UI image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/ui/Dockerfile
          push: true
          tags: |
            ghcr.io/pizzaface/pizzapi-ui:latest
            ghcr.io/pizzaface/pizzapi-ui:main
            ghcr.io/pizzaface/pizzapi-ui:${{ github.sha }}
            ghcr.io/pizzaface/pizzapi-ui:${{ steps.version.outputs.value }}
          build-args: |
            VERSION=${{ steps.version.outputs.value }}
            GIT_SHA=${{ github.sha }}
          cache-from: type=gha,scope=ui-image
          cache-to: type=gha,mode=max,scope=ui-image
