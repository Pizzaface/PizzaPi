name: Android Release (signed)

# Builds a SIGNED Android release (APK + AAB) and uploads them as artifacts.
# Reads the keystore + credentials from repository secrets — see
# reference/mobile-builds for how to generate the keystore and set the secrets:
#
#   PIZZAPI_KEYSTORE_BASE64     base64 of your .jks   (base64 -i release.jks)
#   PIZZAPI_KEYSTORE_PASSWORD   keystore password
#   PIZZAPI_KEY_ALIAS           key alias
#   PIZZAPI_KEY_PASSWORD        key password
#
# Never runs on pull requests, so secrets are never exposed to forks.
on:
  workflow_dispatch:
    inputs:
      versionName:
        description: "versionName, e.g. 1.2.3 (blank = tag name, else gradle default)"
        required: false
        default: ""
      versionCode:
        description: "versionCode integer, must increase per Play Store upload (blank = gradle default)"
        required: false
        default: ""
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: android-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build signed release
    runs-on: ubuntu-latest
    env:
      PIZZAPI_KEYSTORE_BASE64: ${{ secrets.PIZZAPI_KEYSTORE_BASE64 }}
      PIZZAPI_KEYSTORE_PASSWORD: ${{ secrets.PIZZAPI_KEYSTORE_PASSWORD }}
      PIZZAPI_KEY_ALIAS: ${{ secrets.PIZZAPI_KEY_ALIAS }}
      PIZZAPI_KEY_PASSWORD: ${{ secrets.PIZZAPI_KEY_PASSWORD }}
    steps:
      - name: Check signing secrets are set
        run: |
          missing=
          [ -n "$PIZZAPI_KEYSTORE_BASE64" ] || missing="$missing PIZZAPI_KEYSTORE_BASE64"
          [ -n "$PIZZAPI_KEYSTORE_PASSWORD" ] || missing="$missing PIZZAPI_KEYSTORE_PASSWORD"
          [ -n "$PIZZAPI_KEY_ALIAS" ] || missing="$missing PIZZAPI_KEY_ALIAS"
          [ -n "$PIZZAPI_KEY_PASSWORD" ] || missing="$missing PIZZAPI_KEY_PASSWORD"
          if [ -n "$missing" ]; then
            echo "::error::Missing required repository secrets:$missing"
            echo "Add them under Settings → Secrets and variables → Actions."
            exit 1
          fi

      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: sdkmanager "platforms;android-36" "build-tools;36.0.0" "platform-tools"

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - name: Cache Bun artifacts
        uses: actions/cache@v5
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: ${{ runner.os }}-${{ runner.arch }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Resolve version
        id: ver
        run: |
          NAME="${{ github.event.inputs.versionName }}"
          if [ -z "$NAME" ] && [ "$GITHUB_REF_TYPE" = "tag" ]; then
            NAME="${GITHUB_REF_NAME#v}"
          fi
          echo "name=$NAME" >> "$GITHUB_OUTPUT"

      - name: Decode keystore
        run: echo "$PIZZAPI_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/release.jks"

      - name: Build signed release (APK + AAB, verified)
        run: bun run build:mobile:android:release
        env:
          PIZZAPI_KEYSTORE_FILE: ${{ runner.temp }}/release.jks
          ORG_GRADLE_PROJECT_versionName: ${{ steps.ver.outputs.name }}
          ORG_GRADLE_PROJECT_versionCode: ${{ github.event.inputs.versionCode }}

      - name: Upload signed artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pizzapi-android-release-${{ github.sha }}
          path: |
            android/app/build/outputs/apk/release/app-release.apk
            android/app/build/outputs/bundle/release/app-release.aab
          if-no-files-found: error
