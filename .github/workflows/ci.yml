name: CI — Test & Build Binaries

on:
  push:
    branches: [main]
    paths-ignore:
      - "packages/docs/**"
      - "**.md"
  pull_request:
    branches: [main]
    paths-ignore:
      - "packages/docs/**"
      - "**.md"
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ───────────────────────────────────────────────────────────────
  # Unit tests (fast, Linux-only — no compiled binary needed)
  # ───────────────────────────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - name: Cache Bun artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Build
        run: bun run build

      - name: Run tests
        run: bun run test

  # ───────────────────────────────────────────────────────────────
  # Build + smoke-test compiled binaries per platform
  # ───────────────────────────────────────────────────────────────
  binary:
    name: Binary — ${{ matrix.target }}
    needs: test
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-x64
            runner: ubuntu-latest
            binary: pizza-linux-x64
          - target: linux-arm64
            runner: ubuntu-latest          # cross-compile
            binary: pizza-linux-arm64
          - target: macos-arm64
            runner: macos-latest           # Apple Silicon runners
            binary: pizza-macos-arm64
          # macos-x64 and windows-x64 are cross-compiled from their respective hosts
          - target: macos-x64
            runner: macos-15-intel         # Intel macOS runner (macos-13 deprecated)
            binary: pizza-macos-x64
          - target: windows-x64
            runner: ubuntu-latest          # cross-compile
            binary: pizza-windows-x64.exe
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - name: Cache Bun artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build packages
        run: bun run build

      - name: Compile binary (${{ matrix.target }})
        working-directory: packages/cli
        run: bun build-binaries.ts --target ${{ matrix.target }}

      - name: Verify binary exists
        run: |
          BINARY="packages/cli/dist/binaries/${{ matrix.target }}/${{ matrix.binary }}"
          if [ ! -f "$BINARY" ]; then
            echo "::error::Binary not found at $BINARY"
            ls -la packages/cli/dist/binaries/${{ matrix.target }}/ || true
            exit 1
          fi
          echo "✅ Binary size: $(du -h "$BINARY" | cut -f1)"

      - name: Verify assets copied
        run: |
          DIR="packages/cli/dist/binaries/${{ matrix.target }}"
          for asset in package.json theme/dark.json; do
            if [ ! -f "$DIR/$asset" ]; then
              echo "::error::Missing asset: $asset"
              ls -laR "$DIR/" || true
              exit 1
            fi
          done
          echo "✅ All required assets present"

      # Smoke test: run the binary on native platforms (not cross-compiled)
      - name: Smoke test — binary runs
        if: >-
          (matrix.target == 'linux-x64' && matrix.runner == 'ubuntu-latest') ||
          (matrix.target == 'macos-arm64' && matrix.runner == 'macos-latest') ||
          (matrix.target == 'macos-x64' && matrix.runner == 'macos-15-intel')
        run: |
          BINARY="packages/cli/dist/binaries/${{ matrix.target }}/${{ matrix.binary }}"
          chmod +x "$BINARY"

          # The binary will crash early (no package.json next to it for pi-coding-agent),
          # but we can verify it's a valid executable that starts up.
          # Exit code 1 is expected; segfault (139) or missing lib (127) are failures.
          set +e
          "$BINARY" --help 2>&1 | head -20
          EXIT_CODE=$?
          set -e

          if [ $EXIT_CODE -eq 139 ]; then
            echo "::error::Binary segfaulted (exit 139)"
            exit 1
          fi
          if [ $EXIT_CODE -eq 127 ]; then
            echo "::error::Missing shared library (exit 127)"
            exit 1
          fi

          echo "✅ Binary executed (exit code: $EXIT_CODE — expected non-zero without full runtime assets)"

      # Validate that inlined resources survive compilation
      - name: Smoke test — inlined template in binary
        if: >-
          (matrix.target == 'linux-x64' && matrix.runner == 'ubuntu-latest') ||
          (matrix.target == 'macos-arm64' && matrix.runner == 'macos-latest') ||
          (matrix.target == 'macos-x64' && matrix.runner == 'macos-15-intel')
        run: |
          BINARY="packages/cli/dist/binaries/${{ matrix.target }}/${{ matrix.binary }}"
          chmod +x "$BINARY"

          # Search the binary for the inlined compose template string.
          # If it's present, the template was compiled into the binary.
          if strings "$BINARY" | grep -q "PIZZAPI_REDIS_URL=redis://redis:6379"; then
            echo "✅ Compose template is embedded in the binary"
          else
            echo "::error::Compose template NOT found in binary — inlining may have failed"
            exit 1
          fi

      - name: Upload binary artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: pizza-${{ matrix.target }}
          path: packages/cli/dist/binaries/${{ matrix.target }}/
          retention-days: 7

  # ───────────────────────────────────────────────────────────────
  # E2E: install flow (`pizzapi web` + register + runner) per distribution
  # ───────────────────────────────────────────────────────────────
  e2e-install-flow:
    name: E2E install flow — ${{ matrix.distribution }}
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        include:
          - distribution: npm
            cli_cmd: pizzapi
          - distribution: binary-linux-x64
            cli_cmd: /work/packages/cli/dist/binaries/linux-x64/pizza-linux-x64
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        if: matrix.distribution == 'binary-linux-x64'
        with:
          bun-version: "1.3.10"

      - name: Cache Bun artifacts (binary build only)
        if: matrix.distribution == 'binary-linux-x64'
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies (binary build only)
        if: matrix.distribution == 'binary-linux-x64'
        run: bun install --frozen-lockfile

      - name: Build binary (linux-x64)
        if: matrix.distribution == 'binary-linux-x64'
        working-directory: packages/cli
        run: bun build-binaries.ts --target linux-x64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build cached E2E tools image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/e2e-tools.Dockerfile
          load: true
          tags: pizzapi/e2e-tools:ci
          cache-from: type=gha,scope=e2e-tools
          cache-to: type=gha,mode=max,scope=e2e-tools

      - name: Run full install-flow E2E inside Ubuntu container
        env:
          DIST: ${{ matrix.distribution }}
          CLI_CMD: ${{ matrix.cli_cmd }}
        run: |
          set -euo pipefail

          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v "$GITHUB_WORKSPACE:/work" \
            -e DIST="$DIST" \
            -e CLI_CMD="$CLI_CMD" \
            pizzapi/e2e-tools:ci bash -lc '
              set -euo pipefail

              docker --version
              docker compose version

              if [ "$DIST" = "npm" ]; then
                npm install -g @pizzapi/pizza
              else
                chmod +x /work/packages/cli/dist/binaries/linux-x64/pizza-linux-x64
              fi

              # Ensure compiled binary mode can locate repo (fallback path used by pizza web)
              mkdir -p /root/.pizzapi/web
              ln -sfn /work /root/.pizzapi/web/repo

              echo "[1/6] Starting pizza web"
              $CLI_CMD web --port 7492 2>&1 | tee /tmp/pizza-web.log

              echo "[2/6] Waiting for web"
              for i in $(seq 1 60); do
                if curl -fsS "http://localhost:7492/" >/dev/null; then
                  break
                fi
                if [ "$i" -eq 60 ]; then
                  echo "Server did not become ready" >&2
                  docker compose -p pizzapi-web logs || true
                  exit 1
                fi
                sleep 2
              done

              echo "[3/6] Registering user"
              RESP=$(curl -fsS -X POST "http://localhost:7492/api/register" \
                -H "content-type: application/json" \
                -d "{\"name\":\"E2E User\",\"email\":\"e2e@example.com\",\"password\":\"e2e-pass-123\"}")
              KEY=$(echo "$RESP" | jq -r ".key // empty")
              if [ -z "$KEY" ]; then
                echo "Registration failed: $RESP" >&2
                exit 1
              fi

              echo "[4/6] Configuring CLI"
              mkdir -p /root/.pizzapi
              cat >/root/.pizzapi/config.json <<EOF
              {"apiKey":"$KEY"}
              EOF
              export PIZZAPI_API_KEY="$KEY"
              export PIZZAPI_RELAY_URL="ws://localhost:7492"

              echo "[5/6] Starting runner"
              ($CLI_CMD runner >/tmp/pizzapi-runner.log 2>&1 &) 

              echo "[6/6] Verifying runner registration"
              for i in $(seq 1 30); do
                if curl -fsS "http://localhost:7492/api/runners" | jq -e "length > 0" >/dev/null 2>&1; then
                  echo "✅ Runner registered"
                  curl -fsS "http://localhost:7492/api/runners" | jq .
                  break
                fi
                if [ "$i" -eq 30 ]; then
                  echo "Runner did not register in time" >&2
                  tail -n 150 /tmp/pizzapi-runner.log >&2 || true
                  docker compose -p pizzapi-web logs >&2 || true
                  exit 1
                fi
                sleep 2
              done

              # Cleanup within container before exit
              $CLI_CMD web stop || true
              docker compose -p pizzapi-web down --volumes --remove-orphans || true
            '

      - name: Show debug logs on failure
        if: failure()
        run: |
          docker compose -p pizzapi-web logs 2>/dev/null || true
